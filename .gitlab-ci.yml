# https://docs.gitlab.com/ee/development/cicd/templates.html
# This specific template is located at:
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Getting-Started.gitlab-ci.yml

stages:          # List of stages for jobs, and their order of execution
  - QAC
  - build
  - test
  - deploy

QAC-job:        # This job runs QAC script when creating tag
  stage: QAC
  script:
#    - Copy-Item -Path "${CI_PROJECT_DIR}" -Destination "C:\PRQA\${CI_COMMIT_TAG}" -Recurse
    - cd c:\PRQA\TOYO_UTIL_PY_U2A
    - .\test3.bat "${CI_PROJECT_DIR}\prj\Ren_U2A16_373_CDC_1MJP\EHVM\" "${CI_PROJECT_DIR}\prj\Ren_U2A16_373_CDC_1MJP\EHVM\host.gpj"
    - Copy-Item -Path "c:\PRQA\TOYO_UTIL_PY_U2A\result" -Destination "${CI_PROJECT_DIR}\result\EHVM" -Recurse
    - Remove-Item -Path "c:\PRQA\TOYO_UTIL_PY_U2A\result\*" -Recurse -Force
    - .\test3.bat "${CI_PROJECT_DIR}\prj\Ren_U2A16_373_CDC_1MJP\PE0VM0\" "${CI_PROJECT_DIR}\prj\Ren_U2A16_373_CDC_1MJP\PE0VM0\PE0VM0.gpj"
    - Copy-Item -Path "c:\PRQA\TOYO_UTIL_PY_U2A\result" -Destination "${CI_PROJECT_DIR}\result\PE0VM0" -Recurse
    - Remove-Item -Path "c:\PRQA\TOYO_UTIL_PY_U2A\result\*" -Recurse -Force
    - .\test3.bat "${CI_PROJECT_DIR}\prj\Ren_U2A16_373_CDC_1MJP\PE1VM1\" "${CI_PROJECT_DIR}\prj\Ren_U2A16_373_CDC_1MJP\PE1VM1\PE1VM1.gpj"
    - Copy-Item -Path "c:\PRQA\TOYO_UTIL_PY_U2A\result" -Destination "${CI_PROJECT_DIR}\result\PE1VM1" -Recurse
    - Remove-Item -Path "c:\PRQA\TOYO_UTIL_PY_U2A\result\*" -Recurse -Force
    - .\test3.bat "${CI_PROJECT_DIR}\prj\Ren_U2A16_373_CDC_1MJP\PE2VM2\" "${CI_PROJECT_DIR}\prj\Ren_U2A16_373_CDC_1MJP\PE2VM2\PE2VM2.gpj"
    - Copy-Item -Path "c:\PRQA\TOYO_UTIL_PY_U2A\result" -Destination "${CI_PROJECT_DIR}\result\PE2VM2" -Recurse
    - Remove-Item -Path "c:\PRQA\TOYO_UTIL_PY_U2A\result\*" -Recurse -Force
    - .\test3.bat "${CI_PROJECT_DIR}\prj\Ren_U2A16_373_CDC_1MJP\PE3VM3\" "${CI_PROJECT_DIR}\prj\Ren_U2A16_373_CDC_1MJP\PE3VM3\PE3VM3.gpj"
    - Copy-Item -Path "c:\PRQA\TOYO_UTIL_PY_U2A\result" -Destination "${CI_PROJECT_DIR}\result\PE3VM3" -Recurse
    - Remove-Item -Path "c:\PRQA\TOYO_UTIL_PY_U2A\result\*" -Recurse -Force
    - Compress-Archive -Path "${CI_PROJECT_DIR}\result\" -DestinationPath "${CI_PROJECT_DIR}\QAC_${CI_COMMIT_TAG}.zip"
  only:
    - tags
  artifacts:
    paths:
      - ${CI_PROJECT_DIR}\QAC_${CI_COMMIT_TAG}.zip
    expire_in: never

build-job:       # This job runs in the build stage, which runs first.
  stage: build
  script:
    - chcp 65001
    - echo "Compiling the code..."
    - echo ${CI_PROJECT_DIR}
    - cd ./tool/RenameMountDriveInfo
#    - Remove-PSDrive -Name "Y"
#    - sleep 1
    - ./x_sb.bat Y
    - cd ${CI_PROJECT_DIR}/prj/Ren_U2A16_373_CDC_1MJP
    - ./ghsmot_build.bat
#    - echo "check default section in map file"
#    - cd ${CI_PROJECT_DIR}/22SS_U2A_Native_Basic/debug/scripts
#    - ./Check-SectionSize.ps1 ../../prj/dst/22SS_U2A_Native_Basic.map
  allow_failure:
    exit_codes: # User defined exit code
      - 137

unit-test-job:   # This job runs in the test stage.
  stage: test    # It only starts when the job in the build stage completes successfully.
  script:
    - echo "Running unit tests... This will take about 60 seconds."
    - sleep 1
    - echo "Code coverage is 90%"

lint-test-job:   # This job also runs in the test stage.
  stage: test    # It can run at the same time as unit-test-job (in parallel).
  script:
    - echo "Linting code... This will take about 10 seconds."
    - sleep 1
    - echo "No lint issues found."

deploy-job:      # This job runs in the deploy stage.
  stage: deploy  # It only runs when *both* jobs in the test stage complete successfully.
# environment: production
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."

