# This file is a template, and might need editing before it works on your project.
# This is a sample GitLab CI/CD configuration file that should run without any modifications.
# It demonstrates a basic 3 stage CI/CD pipeline. Instead of real tests or scripts,
# it uses echo commands to simulate the pipeline execution.
#
# A pipeline is composed of independent jobs that run scripts, grouped into stages.
# Stages run in sequential order, but jobs within stages run in parallel.
#
# For more information, see: https://docs.gitlab.com/ee/ci/yaml/index.html#stages
#
# You can copy and paste this template into a new `.gitlab-ci.yml` file.
# You should not add this template to an existing `.gitlab-ci.yml` file by using the `include:` keyword.
#
# To contribute improvements to CI/CD templates, please follow the Development guide at:
# https://docs.gitlab.com/ee/development/cicd/templates.html
# This specific template is located at:
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Getting-Started.gitlab-ci.yml

stages:
  - build

# 共有テンプレート（隠しジョブ）
.build-template:
  stage: build
  # Windows ランナーの場合の例（cmd ベース）。PowerShellなら shell: pwsh を指定してスクリプトを調整してください
  script:
    - chcp 65001
    - echo "Compiling the code for %PROJECT_KEY% ..."
    - echo ${CI_PROJECT_DIR}

    # 例：ドライブマウント情報の前処理
    - cd ./tool/RenameMountDriveInfo
    - ./x_sb.bat Y

    # 各プロジェクトのビルドへ
    - cd ${CI_PROJECT_DIR}/prj/${PROJECT_DIR}
    - ./ghsmot_build.bat

    # 必要ならここでセクションチェックや追加の検証を有効化
    ### - echo "check default section in map file"
    ### - cd %CI_PROJECT_DIR%\22SS_U2A_Native_Basic\debug\scripts
    ### - powershell -ExecutionPolicy Bypass -File .\Check-SectionSize.ps1 ..\..\prj\dst\22SS_U2A_Native_Basic.map

  # 137（Out of Memory/Kill）をユーザー許容
  allow_failure:
    exit_codes:
      - 137

  # 失敗したプロジェクトのログのみを保存（プロジェクトごとに個別名）
  artifacts:
    name: "build-log-${PROJECT_KEY}-${CI_PIPELINE_ID}"
    paths:
      - ${CI_PROJECT_DIR}/prj/${PROJECT_DIR}/build.log
    when: on_failure
    expire_in: never

# ===== 実ジョブ（並列マトリクス展開） =====
# 1つの定義からプロジェクトごとに変数を差し替えて並列実行します
build-all-projects:
  extends: .build-template
  parallel:
    matrix:
      # ここにビルドしたいプロジェクトを列挙（必要数だけ増やせます）
      - PROJECT_KEY: "1MJP"
        PROJECT_DIR: "Ren_U2A16_373_CDC_1MJP"
      - PROJECT_KEY: "1MUS"
        PROJECT_DIR: "Ren_U2A16_373_CDC_1MUS"
      - PROJECT_KEY: "1MOT"
        PROJECT_DIR: "Ren_U2A16_373_CDC_1MOT"
      - PROJECT_KEY: "2MJP"
        PROJECT_DIR: "Ren_U2A16_373_CDC_2MJP"
      - PROJECT_KEY: "2MUS"
        PROJECT_DIR: "Ren_U2A16_373_CDC_2MUS"
      - PROJECT_KEY: "2MOT"
        PROJECT_DIR: "Ren_U2A16_373_CDC_2MOT"
      # 例：さらに増やす場合
      # - PROJECT_KEY: "1EU"
      #   PROJECT_DIR: "Ren_U2A16_373_CDC_1EU"