/******************************************************/
/*************** 外部設定情報ファイル *****************/
/******************************************************/

/******************** 注意事項 ************************/
/* 1. "[]"で囲まれた箇所をセクションと定義している    */
/* 2. セクションの中には変数名を1つ以上定義している   */
/* 3. 変数名の"="の後ろが実際にデータを設定する領域   */
/* 4. データ毎のセパレータは','を使用する方針         */
/* 5. 数値は0xが付いていれば16進数、いなければ10進数  */
/* 6. 上記はCAPL関数の仕様となるので変更不可          */
/******************************************************/

/**** 共通設定情報を設定(変更不要) ****/
/**** 通信設定用の診断記述ファイル名を設定(変更不要) ****/
/**** DLL用の診断記述ファイル名を設定(変更不要) ****/
[General]
Ecudef=Can_Transport_Setting
DLL=Seed_Key_Generate_DLL_Setting


/**** Nonce値(16バイト)を設定 ****/
[Nonce]
Nonce=Data\Nonce\Nonce.csv


/**** Fingerprintに使用するテスターシリアル番号(24バイト)を設定 ****/
[applicationSoftwareFingerprint]
applicationSoftwareFingerprint=Data\applicationSoftwareFingerprint\applicationSoftwareFingerprint.csv


/**** CANoeシーケンス停止設定 ****/
/**** CANoeシーケンス停止の契機となるSID(指定したSIDの送信直前から、それ以降の処理を停止) ****/
/*============================================================================*/
/* | No | sid  | subfunc | timing | 停止契機サービス       | LB数分繰り返し | */
/* |----|------|---------|--------|------------------------|----------------| */
/* |  1 | 0x10 | 0x01    | －     | SID10 (default)        | －             | */
/* |  2 | 0x10 | 0x02    | －     | SID10 (programming)    | －             | */
/* |  3 | 0x27 | 0x01    | －     | SID27 (requestSeed)    | －             | */
/* |  4 | 0x27 | 0x02    | －     | SID27 (sendKey)        | －             | */
/* |  5 | 0x2E | 0xF160  | －     | SID2E (asfp )          | ○             | */
/* |  6 | 0x2E | 0xF050  | －     | SID2E (Nonce)          | ○             | */
/* |  7 | 0x31 | 0x01    | －     | SID31 (eraseMemory)    | ○             | */
/* |  8 | 0x31 | 0x02    | 0x00   | SID31 (checkSBL：署名) | ○             | */
/* |  9 | 0x31 | 0x02    | 0x01   | SID31 (checkAPL：署名) | ○             | */
/* | 10 | 0x31 | 0x02    | 0x02   | SID31 (checkSBL：CRC)  | ○             | */
/* | 11 | 0x31 | 0x02    | 0x03   | SID31 (checkAPL：CRC)  | ○             | */
/* | 12 | 0x34 | －      | 0x00   | SID34 (SBL)            | ○             | */
/* | 13 | 0x34 | －      | 0x01   | SID34 (APL)            | ○             | */
/* | 14 | 0x36 | －      | 0x00   | SID36 (SBL)            | ○             | */
/* | 15 | 0x36 | －      | 0x01   | SID36 (APL)            | ○             | */
/* | 16 | 0x37 | －      | 0x00   | SID37 (SBL)            | ○             | */
/* | 17 | 0x37 | －      | 0x01   | SID37 (APL)            | ○             | */
/* | 18 | 0x31 | 0x03    | －     | SID31 (valdAPL)        | －             | */
/* | 19 | 0x11 | －      | －     | SID11                  | －             | */
/*============================================================================*/
/* 「LB数分繰り返し」のサービスについて、以下でタイミング指定可能             */
/* lb : 停止LogicalBlockのIndex番号                                           */
/*      SID2E (asfp) ～ SID31 (checkAPL) で指定可能                           */
/*      何回目のLB転送かを指定 (0:1回目, 1:2回目…)                           */
/* データサイズ分の繰り返し送信するSID36について、以下でタイミング指定可能    */
/* bsc: 停止BlockSequenceCounter                                              */
/*      指定bsc値の転送直前に停止                                             */
/*============================================================================*/
[CANoeStop]
sid=0xFF
subfunc=0xFF
timing=0x00
lb=0x00
bsc=0x01


/**** SID 0x10の設定 ****/
/**** SID 0x10(extendedDiagnosticSession)送信時のSPRMIB設定( 0x0=SPRMIB無し / 0x1=SPRMIB有り ) ****/
[DiagnosticSessionControl]
sprmib=0x1


/**** SID 0x22の設定 ****/
/**** SID 0x22の実行制御を設定( 0x0=スキップ / 0x1=実行 ) ****/
[ReadDataByIdentifier]
enable=0x1


/**** SID 0x3Eの設定 ****/
/**** SID 0x3Eのアドレス種別を設定( 0x0=物理アドレス / 0x1=機能アドレス ) ****/
/**** SID 0x3E送信時のSPRMIB設定( 0x0=SPRMIB無し / 0x1=SPRMIB有り ) ****/
[TesterPresent]
addrtype=0x1
sprmib=0x0


/**** SID 0x27の設定 ****/
/**** SID 0x27のSeed値からKey値を生成する際のツール認証キー ****/
[SecurityAccess]
ToolAuthKey=0xF0,0xE1,0xD2,0xC3,0xB4,0xA5,0x96,0x87,0x78,0x69,0x5A,0x4B,0x3C,0x2D,0x1E,0x0F


/**** Post-Programming stepの設定 ****/
/**** リセット時のSIDの指定( 0x0=SID 0x10[DiagnosticSessionControl] / 0x1=SID 0x11[ECUReset]) ****/
[Post-Programming]
ResetService=0x1


/**** 消去書込みルーチンの設定 ****/
/**** 消去書込みルーチンに関する設定情報を記述したファイル名(128バイトまで) ****/
[SBL]
SBLSettingFile=DLfile\SBL.csv


/**** 書換えファイルの設定 ****/
/**** 書換えファイルに関する設定情報を記述したファイル名(128バイトまで) ****/
[APL]
APLSettingFile=DLfile\APL.csv


/**** SID 0x31(validate application)の設定 ****/
/**** OptionRecord送信の指定( 0x0=送信しない / 0x1=送信する )****/
/**** validate applicationに関する設定情報を記述したファイル名(128バイトまで) ****/
[ValidateApplication]
sendOptionRecord=0x0
VLDSettingFile=DLfile\VLD.csv