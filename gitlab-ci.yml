        -Method Post `
        -Headers @{"PRIVATE-TOKEN" = "$env:GITLAB_API_TOKEN"; "Content-Type" = "application/json"} `
        -Body $body
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_TARGET_BRANCH'
      when: on_failure
  tags:
    - vt_smoke_test