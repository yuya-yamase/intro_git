variables:
  # GitLab Runner説明ページのURL
  EXPLAIN_URL: "https://wiki.geniie.net/pages/viewpage.action?pageId=3433128148"
  #VT実行時motファイル格納パス
  MOT_DIR: 'C:\VTSystem\BEV3-CDC-VT\CANoe\SmokeTest_CDC\GitLabRunner\bat\CDC_MCU_Release_Package'
  #VT実行用batファイル格納パス
  EXEC_DIR: 'C:\VTSystem\BEV3-CDC-VT\ExecFile\GitLabRunner'
  #VTスモークテスト実行batファイル名
  VT_SMOKE_BAT: 'StartSmokeTest.bat'
  #調停用ファイル格納パス
  ARBITATION_DIR: 'C:\VTSystem\Arbitration\DevArbitrationFolder'
  #調停ファイル名
  ARBITATION_FILE: 'InDev.tmp'
  # ターゲットブランチ名
  CI_TARGET_BRANCH: 'develop'
  # プロジェクト名（バリなしの場合は空白）
  SMOKE_TEST_PROJECT: '2MUS'

stages:          # List of stages for jobs, and their order of execution
  - build_2MUS   # Stage for building 2MUS project
  - build_2MJP   # Stage for building 2MJP project
  - build_2MOT   # Stage for building 2MOT project
  - notification
  - vt_smoke_test
  - vt_smoke_test_notification

build-2MUS-job:
  stage: build_2MUS
  script:
    #Merge target branch
    - echo "Fetching target branch for merged results simulation..."
    - git fetch origin $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
    - echo "Merging target branch into current branch..."
    - git merge origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME --no-edit

    - pushd .\tool\RenameMountDriveInfo
    - .\x_sb.bat z
    - popd
    - echo "Build 2MUS job started"
    - pushd Z:\prj\Ren_U2A16_373_CDC_2MUS\
    - .\ghsmot_build.bat
    - popd
    - echo "Build 2MUS job completed"
    - |
      if (!(Test-Path "./prj/RFP/bin/AA_BEVS3_CDC_MCU_2MUS_*.mot")) {
        Write-Error "Artifact file(s) not found: ./prj/RFP/bin/AA_BEVS3_CDC_MCU_2MUS_*.mot"
        exit 1
      }

    - mkdir .\smoketest_2MUS\RFP\bin
    - Copy-Item -Path ".\prj\RFP\*" -Destination ".\smoketest_2MUS\RFP" -Recurse -Force -Exclude "bin"
    - Move-Item -Path ".\prj\RFP\bin\*.mot",".\prj\RFP\bin\*.hex",".\prj\RFP\bin\*.x" -Destination ".\smoketest_2MUS\RFP\bin\" -Force
    - echo "build result copy completed"

  artifacts:
    paths:
      - ./smoketest_2MUS/
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_TARGET_BRANCH'
      when: always
      # Only run this job for merge requests targeting the develop branch
  tags:
    - ci_develop_cdc

